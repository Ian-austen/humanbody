<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>高清写实人体解剖科普站</title>
    <style>
        :root { --accent: #e74c3c; --panel: #1a1a1a; }
        body { margin: 0; background: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; }
        
        /* 侧边栏 */
        .sidebar { width: 380px; background: var(--panel); padding: 30px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 20px; z-index: 10; }
        h1 { font-size: 24px; margin: 0; background: linear-gradient(45deg, #fff, #888); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 展示区 */
        .viewer { flex: 1; position: relative; background: radial-gradient(circle, #222 0%, #000 100%); display: flex; justify-content: center; align-items: center; }
        .body-container { position: relative; height: 90vh; width: 400px; }
        
        /* 图片层叠逻辑 */
        .layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: contain; transition: opacity 0.4s ease;
        }

        /* 交互面板 */
        .control-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 12px; }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); }
        .info-card { background: #222; border-left: 4px solid var(--accent); padding: 20px; border-radius: 8px; min-height: 180px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        button { background: #333; color: #fff; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; transition: 0.3s; }
        button.active { background: var(--accent); }
        .hotspot { position: absolute; cursor: pointer; border: 1px solid transparent; }
        .hotspot:hover { border: 1px dashed rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>人体结构与功能科普</h1>
    
    <div class="control-box">
        <label>性别/视角切换</label>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button id="btn-m" class="active" onclick="setView('male')">男性正面</button>
            <button id="btn-f" onclick="setView('female')">女性正面</button>
        </div>
    </div>

    <div class="control-box">
        <label>解剖深度 (Slide to Dissect)</label>
        <input type="range" id="depth" min="0" max="100" value="100" oninput="updateDepth(this.value)">
        <div style="display:flex; justify-content:space-between; font-size:12px; color:#888; margin-top:5px;">
            <span>内部器官</span><span>肌肉/皮肤</span>
        </div>
    </div>

    <div class="info-card" id="info-panel">
        <h3 id="info-title">点击身体部位探索</h3>
        <p id="info-text">拖动上方滑块可观察皮肤下的肌肉与内脏分布。点击对应区域查看医学解析。</p>
    </div>
</div>

<div class="viewer">
    <div class="body-container" id="body-box">
        <img id="img-internal" class="layer" src="http://googleusercontent.com/image_collection/image_retrieval/17199362456836802893_0" style="opacity:0">
        <img id="img-skin" class="layer" src="http://googleusercontent.com/image_collection/image_retrieval/341940029880142907_1">
        
        <div class="hotspot" style="top:5%; left:35%; width:30%; height:12%;" onclick="showInfo('brain')"></div>
        <div class="hotspot" style="top:22%; left:30%; width:40%; height:15%;" onclick="showInfo('lungs')"></div>
        <div class="hotspot" style="top:28%; left:42%; width:16%; height:10%;" onclick="showInfo('heart')"></div>
        <div class="hotspot" style="top:40%; left:30%; width:40%; height:15%;" onclick="showInfo('digestive')"></div>
    </div>
</div>

<script>
    const data = {
        brain: { t: "大脑 (Brain)", d: "中枢神经系统的最高级部分。负责处理感官信息、发起运动、产生语言以及进行思考和记忆。它消耗了人体约20%的氧气和能量。" },
        lungs: { t: "肺 (Lungs)", d: "呼吸系统的核心器官。写实图中展示了左右肺叶，它们负责将氧气吸入血液并排出二氧化碳。成年人每天呼吸约2万次。" },
        heart: { t: "心脏 (Heart)", d: "强有力的肌肉泵，位于胸腔中部偏左。它通过收缩将血液泵向全身。这张图中你可以看到它与大血管的连接点。" },
        digestive: { t: "消化系统 (Digestive)", d: "包括胃、肝脏、小肠和大肠。负责分解食物并吸收维持生命所需的营养物质。肝脏也是人体最大的解剖腺体。" }
    };

    function updateDepth(val) {
        // 实现丝滑的透明度切换
        document.getElementById('img-skin').style.opacity = val / 100;
        document.getElementById('img-internal').style.opacity = 1 - (val / 100);
    }

    function showInfo(key) {
        document.getElementById('info-title').innerText = data[key].t;
        document.getElementById('info-text').innerText = data[key].d;
    }

    function setView(gender) {
        document.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        const skinImg = document.getElementById('img-skin');
        const internalImg = document.getElementById('img-internal');
        
        if(gender === 'male') {
            skinImg.src = "http://googleusercontent.com/image_collection/image_retrieval/341940029880142907_1";
            internalImg.src = "http://googleusercontent.com/image_collection/image_retrieval/17199362456836802893_0";
            document.getElementById('btn-m').classList.add('active');
        } else {
            // 引用另一组女性写实素材
            skinImg.src = "http://googleusercontent.com/image_collection/image_retrieval/341940029880142907_0";
            internalImg.src = "http://googleusercontent.com/image_collection/image_retrieval/17199362456836802893_1";
            document.getElementById('btn-f').classList.add('active');
        }
    }
</script>

</body>
</html>
