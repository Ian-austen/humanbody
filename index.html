<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>3D质感人体科普站</title>
    <style>
        :root { --accent: #e74c3c; --skin: #f3c9a2; --organ: #c0392b; }
        body { margin: 0; background: #0a0a0a; color: #eee; font-family: system-ui; display: flex; height: 100vh; overflow: hidden; }
        
        /* 布局 */
        .sidebar { width: 320px; background: #151515; padding: 25px; border-right: 1px solid #333; display: flex; flex-direction: column; gap: 15px; }
        .stage { flex: 1; position: relative; display: flex; justify-content: center; align-items: center; background: radial-gradient(circle, #222, #000); }
        
        /* 人体容器 */
        .human-container { width: 450px; height: 850px; position: relative; }
        svg { width: 100%; height: 100%; filter: drop-shadow(0 0 15px rgba(0,0,0,0.5)); }

        /* 交互效果 */
        .organ { cursor: pointer; transition: 0.3s; stroke: rgba(255,255,255,0); stroke-width: 2; }
        .organ:hover { stroke: rgba(255,255,255,0.8); filter: brightness(1.2); }
        
        /* UI组件 */
        .card { background: #222; padding: 20px; border-radius: 12px; border-left: 4px solid var(--accent); }
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent); margin: 15px 0; }
        .btn-toggle { background: #333; color: #fff; border: 1px solid #444; padding: 8px 15px; border-radius: 6px; cursor: pointer; flex: 1; }
        .btn-toggle.active { background: var(--accent); border-color: var(--accent); }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="margin:0; color:var(--accent);">人体科普系统</h2>
    <p style="font-size: 13px; color: #888;">实时渲染引擎 (WebGL/SVG)</p>
    
    <div style="display:flex; gap:10px;">
        <button class="btn-toggle active" id="m-btn" onclick="setGender('male')">男/正面</button>
        <button class="btn-toggle" id="f-btn" onclick="setGender('female')">女/正面</button>
    </div>

    <div>
        <label style="font-size: 14px;">解剖透明度 (Dissection)</label>
        <input type="range" min="0" max="100" value="100" oninput="dissect(this.value)">
    </div>

    <div class="card">
        <h3 id="info-t" style="margin-top:0; color:var(--accent);">移动鼠标点击</h3>
        <p id="info-d" style="font-size: 14px; line-height: 1.6;">拖动滑块可以“看穿”皮肤。点击具体的红色器官区域获取解剖学功能介绍。</p>
    </div>
</div>

<div class="stage">
    <div class="human-container">
        <svg viewBox="0 0 200 500">
            <defs>
                <radialGradient id="skinG">
                    <stop offset="0%" stop-color="#ffe4c4" />
                    <stop offset="100%" stop-color="#d2b48c" />
                </radialGradient>
                <linearGradient id="organG" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#ff5f6d" />
                    <stop offset="100%" stop-color="#ffc371" />
                </linearGradient>
            </defs>

            <path id="skin" d="M100,20 C115,20 130,35 130,70 C130,110 120,135 145,180 C170,230 155,480 135,480 L65,480 C45,480 30,230 55,180 C80,135 70,110 70,70 C70,35 85,20 100,20" fill="url(#skinG)" />

            <g id="internal" style="opacity: 0;">
                <path class="organ" d="M75,110 Q60,110 60,160 Q80,180 95,165 Z" fill="#ff7f7f" onclick="show('lungs')"/>
                <path class="organ" d="M125,110 Q140,110 140,160 Q120,180 105,165 Z" fill="#ff7f7f" onclick="show('lungs')"/>
                <circle class="organ" cx="102" cy="140" r="12" fill="#b33939" onclick="show('heart')"/>
                <path class="organ" d="M75,185 L115,180 L120,210 Q95,220 70,210 Z" fill="#8e44ad" onclick="show('liver')"/>
                <path class="organ" d="M115,200 Q140,200 135,240 Q110,260 90,240 Z" fill="#eb9d8d" onclick="show('stomach')"/>
                <rect class="organ" x="80" y="250" width="45" height="40" rx="5" fill="#d35400" onclick="show('intestine')"/>
            </g>
        </svg>
    </div>
</div>

<script>
    const db = {
        heart: { t: "心脏 (The Heart)", d: "人体内循环系统的核心泵，位于胸腔中部，由强健的心肌构成。它负责将氧气丰富的血液输送到全身各处。" },
        lungs: { t: "肺部 (The Lungs)", d: "呼吸系统的主要器官。通过数亿个肺泡进行气体交换，吸入氧气并排出二氧化碳。" },
        liver: { t: "肝脏 (The Liver)", d: "人体内最大的内脏器官。具有代谢、解毒、制造胆汁等500多种功能，是人体最重要的“化学加工厂”。" },
        stomach: { t: "胃部 (The Stomach)", d: "消化系统的囊状器官，通过分泌强酸和酶来初步分解食物。它的内壁每隔几天就会自我更新。" },
        intestine: { t: "肠道 (Intestines)", d: "包括小肠和大肠。小肠主要负责吸收营养，而大肠负责吸收水分。它们的总长度超过6米。" }
    };

    function dissect(val) {
        document.getElementById('skin').style.opacity = val / 100;
        document.getElementById('internal').style.opacity = 1 - (val / 100);
    }

    function show(key) {
        document.getElementById('info-t').innerText = db[key].t;
        document.getElementById('info-d').innerText = db[key].d;
    }

    function setGender(g) {
        document.querySelectorAll('.btn-toggle').forEach(b => b.classList.remove('active'));
        const skin = document.getElementById('skin');
        if(g === 'male') {
            document.getElementById('m-btn').classList.add('active');
            skin.setAttribute('d', "M100,20 C115,20 130,35 130,70 C130,110 120,135 145,180 C170,230 155,480 135,480 L65,480 C45,480 30,230 55,180 C80,135 70,110 70,70 C70,35 85,20 100,20");
        } else {
            document.getElementById('f-btn').classList.add('active');
            skin.setAttribute('d', "M100,20 C115,20 130,40 130,75 C130,115 145,150 155,200 C175,260 155,480 130,480 L70,480 C45,480 25,260 45,200 C55,150 70,115 70,75 C70,40 85,20 100,20");
        }
    }
</script>
</body>
</html>
